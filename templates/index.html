<!DOCTYPE html>
<html>
<head>
    <title>People Manager Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h1>People Manager Dashboard</h1>
            <p>Manage personal records using Flask and SQLAlchemy ORM</p>
        </div>

        <div class="stats-card">
            <h2>{{ people|length }}</h2>
            <p>Records</p>
        </div>
    </div>

    <div class="card">
        <h2>Add New Record</h2>

        <form action="/add" method="POST" class="form">

            <input
                type="text"
                name="name"
                placeholder="Enter Name"
                required
            >

            <input
                type="number"
                name="age"
                placeholder="Enter Age"
                required
            >

            <button type="submit">
                Add
            </button>

        </form>
    </div>

    <div class="card">

        <h2>Saved Records</h2>

        <table>

            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Actions</th>
            </tr>

            {% for person in people %}
            <tr>

                <td>{{ person.name }}</td>

                <td>{{ person.age }}</td>

                <td>

                    <a class="edit-btn"
                       href="/edit/{{ person.id }}">
                       Edit
                    </a>

                    <a class="delete-btn"
                       href="/delete/{{ person.id }}">
                       Delete
                    </a>

                </td>

            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
